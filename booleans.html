<!DOCTYPE html>
<head>
    <title>Booleans</title>
</head>
<body>
    <script>
        console.log(typeof true); //boolean
        true 
        false   

        console.log(3 < 5);
        console.log(5 == '5.00') // double equals convert both values into the same type (true)
        console.log(5 == '5.5') // False
        console.log(5 === '5.00') // false === works as normal equal's too
        //Order of Ooperations
        /* 1. (...)
           2. * /
           3. + -
           4. Comparison operators 
           5. Logical operators */

        //AND Operator &&
        console.log(true && true); //true
        console.log(false && true); //false

        //OR Operator ||
        console.log(true || false); //true
        console.log(true || true); //true

        //Not Operator !
        console.log(!true); //false
        console.log(!false); //true
        
        
        if (0) {
            console.log('truthy');
        }

        const cartQuantity = 5;
        if (cartQuantity) {
            console.log('cart has products');
        }

        console.log('hello' / 5); // NaN (Not a number)
        let variable1; // we can't use const to use need to assign value 
        console.log(variable1); // undefined 
        //Falsy Values
        // false 0 '' NaN undefined null
        // Any value not on this list is truthy
        // We can also use truthy and falsy with logical operators 

        //Ternary Operator ?:
        const result = true ? 'truthy' : 'falsy';
        console.log(result); // truthy (short cut of if else statement)

    </script>
</body>
</html>
