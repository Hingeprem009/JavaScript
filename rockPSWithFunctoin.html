<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rock Paper Scissors</title>
</head>
<body>
    <p>Rock Paper Scissors</p>
    <button onclick="
        // Call the function and store the returned computer move.
        const computerMove = pickComputerMove();
        
        let result = '';
        if(computerMove === 'rock') {
            result = 'Tie';
        } else if(computerMove === 'paper') {
            result = 'You lose.';
        } else if(computerMove === 'scissors') {
            result = 'You win.'
        }
        alert(`You picked rock. Computer picked ${computerMove}. ${result}`);
    ">Rock</button>
    <button onclick="
        // Call the function and store the returned computer move.
        const computerMove = pickComputerMove();
        
        let result = '';
        if(computerMove === 'rock') {
            result = 'You win';
        } else if(computerMove === 'paper') {
            result = 'Tie';
        } else if(computerMove === 'scissors') {
            result = 'You lose'
        }
        alert(`You picked Paper. Computer picked ${computerMove}. ${result}`);
    ">Paper</button>
    <button onclick="
        // pickComputerMove(); //calling the function (Method1) without return for that variable should be Global.
        const computerMove = pickComputerMove(); // Method 2 (if the function returns computerMove):
        let result = '';
        if(computerMove === 'rock') {
            result = 'You lose';
        } else if(computerMove === 'paper') {
            result = 'You win.';
        } else if(computerMove === 'scissors') {
            result = 'Tie'
        }
        alert(`You picked Scissors. Computer picked ${computerMove}. ${result}`);
    ">Scissors</button>

    <script>
        //let computerMove = ''; //Global Variables 

        function pickComputerMove() {
            const randomNumber = Math.random();
            
            let computerMove = '';  //best practice to use inside the scope to avoid naming conflict

            if (randomNumber >= 0 && randomNumber < 1/3) {
                computerMove = 'rock';
            } else if(randomNumber >= 1/3 && randomNumber < 2/3) {
                computerMove = 'paper';
            } else if(randomNumber >= 2/3 && randomNumber < 1) {
                computerMove = 'scissors';
            } 

            return computerMove;
            // we can also return computerMove;
        }
    </script>
</body>
</html>
