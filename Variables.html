<!DOCTYPE html>
<html>
    <head>
        <title>Variables</title>
    </head>
    <body>
        <script>
            let variable1 = 3;
            console.log(variable1);

            let calculation = 2 + 2;
            console.log(calculation);
            console.log(calculation + 2);

            let result = calculation + 2;
            console.log(result);

            let message = 'hello';
            console.log(message);
            // Variable name restrictions:
            // Can't use special words like: let
            // Can't start with a number
            // We can't use special characters except $_

            //Re-assigning a value to a variable
            variable1 = 5;
            console.log(variable1);

            variable1 = variable1 + 1;
            console.log(variable1);

            // Const is always fix can't change later
            const variable2 = 3;
            //We can't Assign to constant variable. 
            //variable2 = 5; Error X

            var variable3 = 3;
            //Typeof to check the type 
            console.log(typeof('prem')); //string 
            console.log(typeof 3.14);   //number
            console.log(typeof 12);     //number
            console.log(typeof true);   //boolean


        </script>
    </body>
</html>
