<!DOCTYPE html>
<html lang="en">
<head>
    <title>Functions</title>
</head>
<body>
    <script>
        //A Function lets us reuse code.
        function function1() {
            console.log('hello');
            console.log(2 + 2);
        }

        function1(); //calling the function 
        function1();

        //Return - gets a value out of a function
        //Parameter - puts a value into a function

        function calculateTax(cost, taxPercent = 0.1) { //function can also have more than one parameters
            //taxPercent carrys default value in it 0.1
            console.log(cost * taxPercent); 
        }
        calculateTax(2000, 0.2); //passing the value into the function
        calculateTax(5000);
    </script>
</body>
</html>
